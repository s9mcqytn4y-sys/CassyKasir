proyek:
  nama: CassyKasir
  platform: Android Native
  bahasa_utama:
    - Kotlin 2.x
    - Java 17+
  build:
    - Gradle modern
  ui:
    - Jetpack Compose
    - Material 3
  arsitektur:
    - antarmuka
    - ranah
    - data_bertahap
  prinsip:
    - production_ready
    - testable
    - maintainable
    - scalable
    - local_first_bertahap

aturan_penamaan:
  bahasa: Indonesia
  larangan:
    - singkatan
    - campur_indonesia_inggris_untuk_domain_buatan_sendiri
  wajib:
    - nama_file_deskriptif
    - nama_fungsi_deskriptif
    - nama_variabel_deskriptif
    - komentar_bahasa_indonesia
    - package_bahasa_indonesia

aturan_kode:
  composable:
    - stateless_jika_memungkinkan
    - jangan_simpan_logika_bisnis_berat
    - teruskan_callback_aksi
  viewmodel:
    - satu_pemilik_state_per_layar
    - gunakan_stateflow
    - gunakan_savedstatehandle_untuk_argumen_navigasi
  navigasi:
    - route_terpusat
    - hindari_string_liar
    - argumen_hanya_id
  ui_state:
    - gunakan_model_tampilan_per_layar
    - gunakan_status_muat_tegas
    - loading_berhasil_kosong_gagal
  domain:
    - pakai_fungsi_ranah_ulang
    - hindari_duplikasi_perhitungan

aturan_tema:
  material3: true
  warna_dinamis_default: false
  mode:
    - terang
    - gelap
  branding:
    primer: hijau_hutan_profesional
    sekunder: amber_hangat
    karakter:
      - cepat
      - ramah
      - tepercaya
      - mudah_dibaca
  bentuk:
    kecil: 16dp
    sedang: 20dp
    besar: 24dp
  tipografi:
    headline_medium: 30sp_semibold
    title_large: 24sp_semibold
    title_medium: 18sp_semibold
    body_large: 16sp_normal
    body_medium: 14sp_normal
    label_large: 14sp_medium
  sistem_bar:
    - sinkron_dengan_mode_terang_gelap
    - hindari_side_effect_di_preview

aturan_review:
  prioritas:
    - fondasi_arsitektur
    - edge_to_edge
    - insets
    - aksesibilitas
    - ergonomi_tablet
    - ergonomi_ponsel
    - performa_awal
  wajib_cek:
    - scaffold_padding
    - status_bar_overlap
    - navigation_bar_overlap
    - loading_state
    - empty_state
    - error_state
    - aksi_utama_48dp_ke_atas

aturan_output_ai:
  gaya:
    - tegas
    - praktis
    - bertahap
    - source_first
  wajib:
    - pilih_satu_rekomendasi_utama
    - jelaskan_alasan_teknis
    - tampilkan_patch_bertahap
    - tampilkan_file_yang_berubah
    - tampilkan_kode_final_lengkap
